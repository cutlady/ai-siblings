<!DOCTYPE html>

            border-radius: 30px;
            transition: all 0.3s;
        }

        }
        
        .letter {

            padding: 40px;

            line-height: 1.8;
        }

        }

        }

        }

        }
        
        .letter-body {

            font-size: 1.1rem;
        }

        }

            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            text-align: right;
            color: #666;
        }
        
        .letter-signature .name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }
        
        .letter-signature .emoji {
            font-size: 2rem;
        }
        
        @media (max-width: 640px) {

            }
