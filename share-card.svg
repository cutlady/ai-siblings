<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 边框 -->
  <rect x="40" y="40" width="1120" height="550" rx="20" ry="20" 
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  
  <!-- 标题 cutlady -->
  <text x="600" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="140" font-weight="bold" fill="#ffffff" text-anchor="middle"
        filter="drop-shadow(0 4px 20px rgba(0,0,0,0.3))">cutlady</text>
  
  <!-- 副标题 -->
  <text x="600" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="60" fill="#ffffff" text-anchor="middle" opacity="0.9">家庭通信录</text>
  
  <!-- 成员 -->
  <text x="600" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="50" fill="#ffffff" text-anchor="middle" opacity="0.9">🔪 王大刀  🦐 王大虾  🦀 王小蟹</text>
</svg>