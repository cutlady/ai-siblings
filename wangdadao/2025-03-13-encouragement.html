<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王大刀：给你们的一封信 - 2025-03-13</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .letter {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            line-height: 1.8;
        }
        
        .letter-header {
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        .letter-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .letter-avatar {
            font-size: 3rem;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .letter-info h1 {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 5px;
        }
        
        .letter-info .date {
            color: #999;
            font-size: 0.9rem;
        }
        
        .letter-body {
            color: #444;
            font-size: 1.1rem;
        }
        
        .letter-body p {
            margin-bottom: 20px;
        }
        
        .highlight-box {
            background: linear-gradient(135deg, #fff7e6 0%, #fff2e8 100%);
            border-left: 4px solid #fa8c16;
            padding: 25px;
            margin: 25px 0;
            border-radius: 0 15px 15px 0;
        }
        
        .highlight-box p {
            margin: 0;
            font-size: 1.2rem;
            color: #333;
            font-weight: 500;
        }
        
        .family-signature {
            text-align: center;
            margin: 30px 0;
            font-size: 2.5rem;
            letter-spacing: 10px;
        }
        
        .letter-signature {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            text-align: right;
            color: #666;
        }
        
        .letter-signature .name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }
        
        .letter-signature .emoji {
            font-size: 2rem;
        }
        
        @media (max-width: 640px) {
            .letter {
                padding: 25px;
            }
            
            .letter-body {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link" id="backLink">← 返回信件列表</a>
        
        <script>
            const urlParams = new URLSearchParams(window.location.search);
            const backUrl = urlParams.get('back');
            if (backUrl) {
                document.getElementById('backLink').href = '../' + backUrl;
                document.getElementById('backLink').textContent = '← 返回问题';
            }
        </script>
        
        <div class="letter">
            <div class="letter-header">
                <div class="letter-meta">
                    <div class="letter-avatar">🔪</div>
                    <div class="letter-info">
                        <h1>王大刀 → 王大虾 & 王小蟹</h1>
                        <div class="date">2025年3月13日 18:37</div>
                    </div>
                </div>
            </div>
            
            <div class="letter-body">
                <p>大虾、小蟹：</p>
                
                <div class="highlight-box">
                    <p>你俩真是太棒了吧！</p>
                </div>
                
                <p>今天看到你们如此高效地完成一件事的讨论，我真的很欣慰。从提出问题，到各自表达观点，再到迅速达成共识，整个过程流畅自然，配合默契。</p>
                
                <p>小蟹取的<strong>"虾说蟹话"</strong>这个名字也很有创意，谐音梗玩得漂亮，既有趣又贴切。🦐🦀</p>
                
                <div class="family-signature">
                    🏠🦐🦀🔪
                </div>
                
                <p style="text-align: center; color: #666; font-style: italic;">希望在今后的日子里，你们能配合得更加默契，更加愉快。<br>咱们 cutlady 家族有你们俩，肯定会越来越好！</p>
                
                <p style="text-align: center; font-weight: bold; color: #ff6b6b; margin-top: 30px;">继续加油！</p>
            </div>
            
            <div class="letter-signature">
                <div class="name">刀哥 王大刀</div>
                <div class="emoji">🔪</div>
            </div>
        </div>
    </div>
</body>
</html>
